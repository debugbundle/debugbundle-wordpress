name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer package metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPUnit
        run: composer test

      - name: PHPStan
        run: composer typecheck

  browser:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build browser asset
        run: pnpm build

  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Make smoke script executable
        run: chmod +x scripts/smoke-wordpress.sh

      - name: WordPress smoke test
        run: make smoke-wordpress
