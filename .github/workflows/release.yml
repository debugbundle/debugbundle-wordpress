name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable plugin version to release (for example 0.1.0)
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if [[ -z "$version" ]]; then
            echo "missing_version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate PHP requirement
        shell: bash
        run: php -r '$composer=json_decode(file_get_contents("composer.json"), true); if (($composer["require"]["php"] ?? "") !== ">=8.2") { fwrite(STDERR, "unexpected_php_requirement\n"); exit(1);} '

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests and build
        run: |
          composer test
          composer typecheck
          pnpm build

      - name: Make release script executable
        run: chmod +x scripts/assemble-release.sh

      - name: Assemble release ZIP
        run: ./scripts/assemble-release.sh "${{ steps.release_version.outputs.value }}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ steps.release_version.outputs.value }}"
          zip=".dist/debugbundle-wordpress-${{ steps.release_version.outputs.value }}.zip"
          sha="${zip}.sha256"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$zip" "$sha" --clobber
          else
            gh release create "$tag" "$zip" "$sha" \
              --target "$GITHUB_SHA" \
              --generate-notes
          fi
