services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:php8.2-apache
    depends_on:
      db:
        condition: service_healthy
      mock-ingestion:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    ports:
      - "18080:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "php -r 'exit(@file_get_contents(\"http://127.0.0.1/\") === false ? 1 : 0);'",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/debugbundle

  mock-ingestion:
    image: node:24-alpine
    working_dir: /workspace
    command: ["node", "scripts/mock-ingestion.mjs"]
    environment:
      DEBUGBUNDLE_MOCK_EVENTS_FILE: /workspace/.smoke/ingestion-events.ndjson
      DEBUGBUNDLE_MOCK_FAIL_FILE: /workspace/.smoke/fail-ingestion
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e 'fetch(\"http://127.0.0.1:18081/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./:/workspace

  wpcli:
    image: wordpress:cli-php8.2
    user: "33:33"
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_healthy
      mock-ingestion:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/debugbundle

volumes:
  db_data:
  wordpress_data: