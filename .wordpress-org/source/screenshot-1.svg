<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="960" viewBox="0 0 1280 960" role="img" aria-labelledby="title desc">
  <title id="title">DebugBundle settings screenshot</title>
  <desc id="desc">A stylized WordPress admin settings screen showing project token and service configuration fields.</desc>
  <rect width="1280" height="960" fill="#f0f2f5"/>
  <rect width="232" height="960" fill="#1d2327"/>
  <rect x="232" y="0" width="1048" height="72" fill="#ffffff"/>
  <rect x="264" y="110" width="968" height="792" rx="24" fill="#ffffff" stroke="#dcdcde"/>
  <text x="306" y="170" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#1d2327">DebugBundle Settings</text>
  <text x="306" y="212" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#50575e">Connect this WordPress site to a DebugBundle project and control how incidents are captured.</text>

  <rect x="306" y="266" width="884" height="122" rx="18" fill="#f6f7f7" stroke="#dcdcde"/>
  <text x="336" y="310" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1d2327">Project token</text>
  <rect x="336" y="330" width="824" height="34" rx="10" fill="#ffffff" stroke="#c3c4c7"/>
  <rect x="356" y="340" width="520" height="12" rx="6" fill="#d6dae0"/>

  <rect x="306" y="414" width="420" height="122" rx="18" fill="#f6f7f7" stroke="#dcdcde"/>
  <text x="336" y="458" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1d2327">Environment</text>
  <rect x="336" y="478" width="360" height="34" rx="10" fill="#ffffff" stroke="#c3c4c7"/>
  <text x="360" y="502" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#50575e">production</text>

  <rect x="770" y="414" width="420" height="122" rx="18" fill="#f6f7f7" stroke="#dcdcde"/>
  <text x="800" y="458" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1d2327">Backend service name</text>
  <rect x="800" y="478" width="360" height="34" rx="10" fill="#ffffff" stroke="#c3c4c7"/>
  <text x="824" y="502" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#50575e">wordpress-site</text>

  <rect x="306" y="560" width="884" height="166" rx="18" fill="#0f172a"/>
  <text x="336" y="612" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">What v1 captures</text>
  <text x="336" y="656" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#dbe7f1">• PHP exceptions, fatals, shutdown failures, and request context</text>
  <text x="336" y="694" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#dbe7f1">• Browser incidents relayed through the local WordPress REST endpoint</text>

  <rect x="306" y="770" width="232" height="62" rx="14" fill="#2271b1"/>
  <text x="352" y="810" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#ffffff">Save Changes</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#f0f0f1">
    <text x="28" y="84">Dashboard</text>
    <text x="28" y="134">Posts</text>
    <text x="28" y="184">Media</text>
    <text x="28" y="234">Pages</text>
    <text x="28" y="284">Plugins</text>
    <rect x="12" y="324" width="208" height="44" rx="10" fill="#2271b1"/>
    <text x="28" y="352">Settings → DebugBundle</text>
  </g>
</svg>