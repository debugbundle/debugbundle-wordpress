<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="960" viewBox="0 0 1280 960" role="img" aria-labelledby="title desc">
  <title id="title">DebugBundle frontend capture screenshot</title>
  <desc id="desc">A stylized WordPress admin view showing frontend capture, relay, and privacy controls.</desc>
  <rect width="1280" height="960" fill="#f0f2f5"/>
  <rect width="232" height="960" fill="#1d2327"/>
  <rect x="232" y="0" width="1048" height="72" fill="#ffffff"/>
  <rect x="264" y="110" width="968" height="792" rx="24" fill="#ffffff" stroke="#dcdcde"/>
  <text x="306" y="170" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#1d2327">Frontend capture and relay</text>
  <text x="306" y="212" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#50575e">Keep the project token on the server while receiving browser incidents through a same-origin relay.</text>

  <rect x="306" y="268" width="420" height="188" rx="20" fill="#f6f7f7" stroke="#dcdcde"/>
  <text x="336" y="314" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#1d2327">Frontend capture</text>
  <rect x="336" y="344" width="74" height="38" rx="19" fill="#00a32a"/>
  <circle cx="388" cy="363" r="14" fill="#ffffff"/>
  <text x="430" y="370" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1d2327">Enabled for public pages</text>
  <text x="336" y="416" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#50575e">Sample rate</text>
  <rect x="470" y="394" width="220" height="34" rx="10" fill="#ffffff" stroke="#c3c4c7"/>
  <text x="494" y="418" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#50575e">1.0</text>

  <rect x="770" y="268" width="420" height="188" rx="20" fill="#0f172a"/>
  <text x="800" y="314" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#f8fafc">Relay status</text>
  <circle cx="824" cy="366" r="10" fill="#22c55e"/>
  <text x="848" y="374" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#dbe7f1">Same-origin endpoint active</text>
  <circle cx="824" cy="416" r="10" fill="#f59e0b"/>
  <text x="848" y="424" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#dbe7f1">Retry spool available for transient failures</text>

  <rect x="306" y="500" width="884" height="188" rx="20" fill="#f6f7f7" stroke="#dcdcde"/>
  <text x="336" y="546" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#1d2327">Privacy and safety notes</text>
  <text x="336" y="592" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#50575e">• Project token stays server-side</text>
  <text x="336" y="632" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#50575e">• Browser SDK bundle is served locally from the plugin</text>
  <text x="336" y="672" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#50575e">• No external telemetry is sent until the site owner saves a token</text>

  <rect x="306" y="748" width="304" height="62" rx="14" fill="#2271b1"/>
  <text x="354" y="788" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#ffffff">Save Frontend Settings</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#f0f0f1">
    <text x="28" y="84">Dashboard</text>
    <text x="28" y="134">Posts</text>
    <text x="28" y="184">Media</text>
    <text x="28" y="234">Pages</text>
    <text x="28" y="284">Plugins</text>
    <rect x="12" y="324" width="208" height="44" rx="10" fill="#2271b1"/>
    <text x="28" y="352">Settings → DebugBundle</text>
  </g>
</svg>